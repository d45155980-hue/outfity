name: flutteroutfity
description: "OUTFITY - Premium Fashion Shopping App"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.4
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.1.2
  cross_file: ^0.3.4+2
  google_sign_in: ^6.2.2
  google_identity_services_web: ^0.3.3
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
